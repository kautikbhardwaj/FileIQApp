name: Build FileIQ iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Initialize React Native project
        run: |
          npx @react-native-community/cli@13.6.9 init FileIQBuild --version 0.73.6 --directory FileIQBuild

      - name: Copy FileIQ source files
        run: |
          cp App.js FileIQBuild/App.js
          cp -r src FileIQBuild/src

      - name: Install pinned dependencies
        run: |
          cd FileIQBuild
          npm install --legacy-peer-deps \
            @react-native-camera-roll/camera-roll@7.4.0 \
            @react-navigation/bottom-tabs@6.5.20 \
            @react-navigation/native@6.1.17 \
            @react-navigation/stack@6.3.29 \
            react-native-fs@2.20.0 \
            react-native-gesture-handler@2.14.0 \
            react-native-reanimated@3.6.0 \
            react-native-safe-area-context@4.8.2 \
            react-native-screens@3.29.0 \
            react-native-share@10.1.0 \
            react-native-vector-icons@10.0.3 \
            @shopify/flash-list@1.6.3 \
            react-native-permissions@4.1.5 \
            react-native-device-info@11.1.0 \
            date-fns@3.3.1 \
            lodash@4.17.21

      - name: Bundle JavaScript
        run: |
          cd FileIQBuild
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/assets
          echo "Bundle size: $(ls -lh ios/main.jsbundle | awk '{print $5}')"

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: FileIQBuild/ios/Pods
          key: pods-${{ hashFiles('FileIQBuild/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd FileIQBuild/ios
          pod install --repo-update

      - name: Build iOS simulator app
        run: |
          cd FileIQBuild
          xcodebuild \
            -workspace ios/FileIQBuild.xcworkspace \
            -scheme FileIQBuild \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -derivedDataPath ./build \
            BUNDLE_FILE=main.jsbundle \
            CODE_SIGNING_ALLOWED=NO \
            clean build | xcpretty --color

      - name: Boot simulator, install and screenshot
        run: |
          UDID="94090282-6E9E-4A21-AAA3-3D6CFD0F3C55"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          sleep 5

          APP_PATH=$(find "$(pwd)/FileIQBuild/build" -name "*.app" -not -path "*/PackageFrameworks/*" | head -1)
          echo "App: $APP_PATH"

          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" org.reactjs.native.example.FileIQBuild
          sleep 12

          mkdir -p screenshots
          xcrun simctl io "$UDID" screenshot "$(pwd)/screenshots/screen1.png"
          sleep 3
          xcrun simctl io "$UDID" screenshot "$(pwd)/screenshots/screen2.png"
          sleep 3
          xcrun simctl io "$UDID" screenshot "$(pwd)/screenshots/screen3.png"
          ls -lh screenshots/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: FileIQ-Screenshots
          path: screenshots/
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Logs/
          retention-days: 3
