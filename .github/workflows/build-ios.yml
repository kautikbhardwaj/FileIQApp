name: Build FileIQ iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Initialize React Native project
        run: |
          npx @react-native-community/cli@13.6.9 init FileIQBuild --version 0.73.6 --directory FileIQBuild

      - name: Copy FileIQ source files
        run: |
          cp App.js FileIQBuild/App.js
          cp -r src FileIQBuild/src

      - name: Patch Info.plist
        run: |
          PLIST="FileIQBuild/ios/FileIQBuild/Info.plist"

          # App name
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName FileIQ" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string FileIQ" "$PLIST"

          # Photo library permission
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'FileIQ needs access to your photo library to list and manage your photos and videos.'" "$PLIST" 2>/dev/null || true

          # Google Drive URL scheme
          /usr/libexec/PlistBuddy -c "Add :LSApplicationQueriesSchemes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :LSApplicationQueriesSchemes:0 string googledrive" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :LSApplicationQueriesSchemes:1 string comgoogledrivefiles" "$PLIST" 2>/dev/null || true

          # Allow arbitrary loads (WiFi + mobile data)
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST" 2>/dev/null || true

          echo "Info.plist patched"
          cat "$PLIST"

      - name: Install pinned dependencies
        run: |
          cd FileIQBuild
          npm install --legacy-peer-deps \
            @react-native-camera-roll/camera-roll@7.4.0 \
            @react-navigation/bottom-tabs@6.5.20 \
            @react-navigation/native@6.1.17 \
            @react-navigation/stack@6.3.29 \
            react-native-fs@2.20.0 \
            react-native-gesture-handler@2.14.0 \
            react-native-safe-area-context@4.8.2 \
            react-native-screens@3.29.0 \
            react-native-share@10.1.0 \
            react-native-vector-icons@10.0.3 \
            @shopify/flash-list@1.6.3 \
            react-native-permissions@4.1.5 \
            react-native-device-info@11.1.0 \
            react-native-document-picker@9.1.1 \
            date-fns@3.3.1 \
            lodash@4.17.21

      - name: Bundle JavaScript
        run: |
          cd FileIQBuild
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/assets

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: FileIQBuild/ios/Pods
          key: pods-${{ hashFiles('FileIQBuild/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd FileIQBuild/ios
          pod install --repo-update

      - name: Build for real device (arm64)
        run: |
          cd FileIQBuild
          xcodebuild \
            -workspace ios/FileIQBuild.xcworkspace \
            -scheme FileIQBuild \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build | xcpretty --color

      - name: Package into .ipa
        run: |
          cd FileIQBuild
          APP=$(find build -name "*.app" -not -path "*/PackageFrameworks/*" | head -1)
          echo "App: $APP"
          mkdir -p output/Payload
          cp -r "$APP" output/Payload/
          cd output
          zip -r FileIQ.ipa Payload
          ls -lh FileIQ.ipa

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: FileIQ-Device-IPA
          path: FileIQBuild/output/FileIQ.ipa
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Logs/
          retention-days: 3