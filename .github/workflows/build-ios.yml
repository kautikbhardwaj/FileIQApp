name: Build FileIQ iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Initialize React Native project
        run: |
          npx @react-native-community/cli@13.6.9 init FileIQBuild --version 0.73.6 --directory FileIQBuild

      - name: Copy FileIQ source files
        run: |
          cp App.js FileIQBuild/App.js
          cp -r src FileIQBuild/src

      - name: Install extra dependencies
        run: |
          cd FileIQBuild
          npm install --legacy-peer-deps \
            @react-native-camera-roll/camera-roll \
            @react-navigation/bottom-tabs \
            @react-navigation/native \
            @react-navigation/stack \
            react-native-fs \
            react-native-share \
            react-native-vector-icons \
            @shopify/flash-list \
            react-native-permissions \
            react-native-device-info \
            date-fns \
            lodash

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: FileIQBuild/ios/Pods
          key: pods-${{ hashFiles('FileIQBuild/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd FileIQBuild/ios
          pod install --repo-update

      - name: Build iOS simulator app
        run: |
          cd FileIQBuild
          xcodebuild \
            -workspace ios/FileIQBuild.xcworkspace \
            -scheme FileIQBuild \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            clean build | xcpretty --color

      - name: Boot simulator, install and screenshot
        run: |
          # Use known iPhone 16 iOS 18.5 UDID from simulator list
          UDID="94090282-6E9E-4A21-AAA3-3D6CFD0F3C55"

          # Boot simulator
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          sleep 5

          # Get absolute path to .app
          APP_PATH=$(find "$(pwd)/FileIQBuild/build" -name "*.app" -not -path "*/PackageFrameworks/*" | head -1)
          echo "App path: $APP_PATH"

          # Install app
          xcrun simctl install "$UDID" "$APP_PATH"

          # Launch app
          xcrun simctl launch "$UDID" org.reactjs.native.example.FileIQBuild
          sleep 10

          # Take screenshots
          mkdir -p screenshots
          xcrun simctl io "$UDID" screenshot "$(pwd)/screenshots/screen1.png"
          sleep 3
          xcrun simctl io "$UDID" screenshot "$(pwd)/screenshots/screen2.png"
          sleep 3
          xcrun simctl io "$UDID" screenshot "$(pwd)/screenshots/screen3.png"
          ls -lh screenshots/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: FileIQ-Screenshots
          path: screenshots/
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Logs/
          retention-days: 3
