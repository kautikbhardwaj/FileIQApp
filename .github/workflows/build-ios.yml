name: Build FileIQ iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Initialize React Native project
        run: |
          npx @react-native-community/cli@13.6.9 init FileIQBuild --version 0.73.6 --directory FileIQBuild

      - name: Copy FileIQ source files
        run: |
          cp App.js FileIQBuild/App.js
          cp -r src FileIQBuild/src

      - name: Install extra dependencies
        run: |
          cd FileIQBuild
          npm install --legacy-peer-deps \
            @react-native-camera-roll/camera-roll \
            @react-navigation/bottom-tabs \
            @react-navigation/native \
            @react-navigation/stack \
            react-native-fs \
            react-native-share \
            react-native-vector-icons \
            @shopify/flash-list \
            react-native-permissions \
            react-native-device-info \
            date-fns \
            lodash

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: FileIQBuild/ios/Pods
          key: pods-${{ hashFiles('FileIQBuild/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd FileIQBuild/ios
          pod install --repo-update

      - name: Build iOS simulator app
        run: |
          cd FileIQBuild
          xcodebuild \
            -workspace ios/FileIQBuild.xcworkspace \
            -scheme FileIQBuild \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            clean build | xcpretty --color

      - name: Find .app path
        run: |
          APP=$(find FileIQBuild/build -name "*.app" -not -path "*/PackageFrameworks/*" | head -1)
          echo "APP_PATH=$APP" >> $GITHUB_ENV
          echo "Found: $APP"

      - name: Boot simulator and take screenshots
        run: |
          # List all available simulators for debugging
          xcrun simctl list devices available

          # Get first available iPhone UDID
          UDID=$(xcrun simctl list devices available | grep -E "iPhone" | grep -v "unavailable" | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' | head -1)
          echo "Using simulator: $UDID"

          # Boot it
          xcrun simctl boot "$UDID"
          sleep 5

          # Install and launch app
          BUNDLE_ID=$(defaults read "$(pwd)/$APP_PATH/Info" CFBundleIdentifier 2>/dev/null || echo "org.reactjs.native.example.FileIQBuild")
          echo "Bundle ID: $BUNDLE_ID"
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" "$BUNDLE_ID"
          sleep 10

          # Take screenshots
          mkdir -p screenshots
          xcrun simctl io "$UDID" screenshot screenshots/screen1.png
          sleep 3
          xcrun simctl io "$UDID" screenshot screenshots/screen2.png
          sleep 3
          xcrun simctl io "$UDID" screenshot screenshots/screen3.png
          echo "Screenshots done"

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: FileIQ-Screenshots
          path: screenshots/
          retention-days: 7

      - name: Upload simulator app
        uses: actions/upload-artifact@v4
        with:
          name: FileIQ-iOS-Simulator
          path: FileIQBuild/build
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Logs/
          retention-days: 3
